<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Risk Check — HingeAutomator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #050505;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-image:
        radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
      background-attachment: fixed;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .header-icon {
      width: 34px;
      height: 34px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e4e4e7;
    }
    .header h1 span { color: #10b981; }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 1.25rem;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .card-header {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
    }
    .card-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 6px rgba(16, 185, 129, 0.8);
    }
    .card-header-dot.loading {
      background: #52525b;
      box-shadow: none;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .card-header-title {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #52525b;
    }
    .timestamp {
      font-size: 9px;
      font-weight: 600;
      color: #3f3f46;
      letter-spacing: 0.05em;
    }

    /* ── Info rows ── */
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .info-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #52525b;
    }
    .info-value {
      font-size: 11px;
      font-weight: 600;
      color: #d4d4d8;
      font-variant-numeric: tabular-nums;
    }
    .info-value.muted { color: #3f3f46; }
    .info-value.city-country {
      font-size: 11px;
      color: #a1a1aa;
    }

    /* ── Fraud check section ── */
    .fraud-section {
      padding: 12px 16px;
    }

    .btn-fraud {
      width: 100%;
      padding: 11px 16px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 0.75rem;
      background: rgba(16, 185, 129, 0.08);
      color: #10b981;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-fraud:hover:not(:disabled) {
      background: rgba(16, 185, 129, 0.14);
      border-color: rgba(16, 185, 129, 0.35);
    }
    .btn-fraud:active:not(:disabled) { transform: scale(0.98); }
    .btn-fraud:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-fraud.checking {
      color: #52525b;
      border-color: rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }

    /* Spinner */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(16, 185, 129, 0.3);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fraud result badge */
    .fraud-result {
      margin-top: 8px;
      padding: 10px 16px;
      border-radius: 0.75rem;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      display: none;
      transition: all 0.3s ease;
    }
    .fraud-result.show { display: block; }
    .fraud-result.green {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #10b981;
    }
    .fraud-result.yellow {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: #f59e0b;
    }
    .fraud-result.red {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #ef4444;
    }

    /* ── Lat/Lon cards below ── */
    .coord-cards {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .coord-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1rem;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .coord-left { display: flex; flex-direction: column; gap: 2px; }
    .coord-label {
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #52525b;
    }
    .coord-value {
      font-size: 13px;
      font-weight: 700;
      color: #d4d4d8;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }
    .coord-value.muted { color: #3f3f46; font-size: 11px; }

    .btn-copy-coord {
      padding: 7px 14px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 0.5rem;
      background: rgba(16, 185, 129, 0.06);
      color: #10b981;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .btn-copy-coord:hover { background: rgba(16, 185, 129, 0.12); border-color: rgba(16, 185, 129, 0.3); }
    .btn-copy-coord:active { transform: scale(0.96); }
    .btn-copy-coord.copied {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.4);
      color: #34d399;
    }

    /* ── Refresh button ── */
    .btn-refresh {
      width: 100%;
      max-width: 420px;
      padding: 11px 16px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.02);
      color: #52525b;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.04); color: #71717a; border-color: rgba(255,255,255,0.1); }
    .btn-refresh:active { transform: scale(0.98); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 999px;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      font-family: inherit;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🔍</div>
    <h1>IP <span>&</span> Risk Analyse</h1>
  </div>

  <!-- Main info card -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-left">
        <div class="card-header-dot loading" id="statusDot"></div>
        <div class="card-header-title" id="cardTitle">Laden...</div>
      </div>
      <div class="timestamp" id="timestamp"></div>
    </div>

    <div class="info-row">
      <span class="info-label">IP-Adresse</span>
      <span class="info-value muted" id="ip">—</span>
    </div>
    <div class="info-row" style="border-bottom:none;">
      <span class="info-label">Standort</span>
      <span class="info-value city-country muted" id="cityCountry">—</span>
    </div>

    <!-- Fraud check button + result -->
    <div class="fraud-section">
      <button class="btn-fraud" id="fraudBtn" disabled>
        <span id="fraudBtnIcon">🛡️</span>
        <span id="fraudBtnText">Fraud Score prüfen</span>
      </button>
      <div class="fraud-result" id="fraudResult"></div>
    </div>
  </div>

  <!-- Latitude & Longitude below -->
  <div class="coord-cards">
    <div class="coord-card">
      <div class="coord-left">
        <div class="coord-label">Latitude</div>
        <div class="coord-value muted" id="lat">—</div>
      </div>
      <button class="btn-copy-coord" id="copyLat" disabled>Kopieren</button>
    </div>
    <div class="coord-card">
      <div class="coord-left">
        <div class="coord-label">Longitude</div>
        <div class="coord-value muted" id="lon">—</div>
      </div>
      <button class="btn-copy-coord" id="copyLong" disabled>Kopieren</button>
    </div>
  </div>

  <!-- Refresh -->
  <button class="btn-refresh" id="refreshBtn">
    <span id="refreshIcon">↺</span>
    Neu laden
  </button>

  <div class="toast" id="toast"></div>

  <script>
    let lat, lon, ip, trustScore, riskLevel;
    let copyLatValue, copyLonValue;

    const ipEl         = document.getElementById("ip");
    const cityEl       = document.getElementById("cityCountry");
    const latEl        = document.getElementById("lat");
    const lonEl        = document.getElementById("lon");
    const statusDot    = document.getElementById("statusDot");
    const cardTitle    = document.getElementById("cardTitle");
    const timestampEl  = document.getElementById("timestamp");
    const fraudBtn     = document.getElementById("fraudBtn");
    const fraudBtnText = document.getElementById("fraudBtnText");
    const fraudBtnIcon = document.getElementById("fraudBtnIcon");
    const fraudResult  = document.getElementById("fraudResult");
    const copyLatBtn   = document.getElementById("copyLat");
    const copyLongBtn  = document.getElementById("copyLong");
    const refreshBtn   = document.getElementById("refreshBtn");
    const toast        = document.getElementById("toast");

    // ── Offset coordinates (2–3 km) ──
    function getOffsetCoordinate(latDeg, lonDeg, minKm = 2, maxKm = 3) {
      const R = 6371000;
      const lat1 = (latDeg * Math.PI) / 180;
      const lon1 = (lonDeg * Math.PI) / 180;
      const distance = (minKm + Math.random() * (maxKm - minKm)) * 1000;
      const bearing = Math.random() * 2 * Math.PI;
      const dr = distance / R;
      const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(dr) +
        Math.cos(lat1) * Math.sin(dr) * Math.cos(bearing)
      );
      const lon2 = lon1 + Math.atan2(
        Math.sin(bearing) * Math.sin(dr) * Math.cos(lat1),
        Math.cos(dr) - Math.sin(lat1) * Math.sin(lat2)
      );
      let newLat = (lat2 * 180) / Math.PI;
      let newLon = (lon2 * 180) / Math.PI;
      newLon = ((newLon + 540) % 360) - 180;
      return { lat: newLat, lon: newLon };
    }

    function setReady() {
      statusDot.classList.remove("loading");
      cardTitle.textContent = "Network Info";
      const now = new Date();
      timestampEl.textContent = now.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    }

    function unmute(el) { el.classList.remove("muted"); }

    // ── Load IP & geo data ──
    async function loadData() {
      statusDot.classList.add("loading");
      cardTitle.textContent = "Laden...";
      fraudBtn.disabled = true;
      fraudResult.classList.remove("show");

      try {
        const geo = await fetch("https://ipapi.co/json/").then(r => r.json());
        ip  = geo.ip;
        lat = parseFloat(geo.latitude);
        lon = parseFloat(geo.longitude);
        const city    = geo.city || "";
        const country = geo.country_name || "";

        ipEl.textContent = ip; unmute(ipEl);
        cityEl.textContent = [city, country].filter(Boolean).join(", ") || "—"; unmute(cityEl);

        const off = getOffsetCoordinate(lat, lon, 2, 3);
        copyLatValue = off.lat.toFixed(6);
        copyLonValue = off.lon.toFixed(6);

        latEl.textContent = lat.toFixed(6); unmute(latEl); latEl.classList.remove("muted");
        lonEl.textContent = lon.toFixed(6); unmute(lonEl); lonEl.classList.remove("muted");
        copyLatBtn.disabled  = false;
        copyLongBtn.disabled = false;
        fraudBtn.disabled    = false;

        setReady();
      } catch (err) {
        console.error(err);
        cardTitle.textContent = "Fehler beim Laden";
        statusDot.classList.add("loading");
      }
    }

    // ── Fraud check (on demand) ──
    async function checkFraud() {
      if (!ip) return;
      fraudBtn.disabled = true;
      fraudBtnIcon.textContent = "";
      const spinner = document.createElement("span");
      spinner.className = "spinner";
      fraudBtnIcon.appendChild(spinner);
      fraudBtnText.textContent = "Prüfe...";
      fraudBtn.classList.add("checking");
      fraudResult.classList.remove("show");

      try {
        const res = await fetch(`/api/fraud-check?ip=${ip}`).then(r => r.json());
        trustScore = res.score;
        riskLevel  = res.risk;

        fraudResult.classList.add("show");
        if (riskLevel === "low") {
          fraudResult.className = "fraud-result show green";
          fraudResult.textContent = `🟢 Niedriges Risiko · Score ${trustScore}`;
        } else if (riskLevel === "medium") {
          fraudResult.className = "fraud-result show yellow";
          fraudResult.textContent = `🟡 Mittleres Risiko · Score ${trustScore}`;
        } else {
          fraudResult.className = "fraud-result show red";
          fraudResult.textContent = `🔴 Hohes Risiko · Score ${trustScore}`;
        }
      } catch (err) {
        console.error(err);
        fraudResult.className = "fraud-result show";
        fraudResult.style.color = "#71717a";
        fraudResult.textContent = "Fehler bei der Abfrage";
        fraudResult.classList.add("show");
      } finally {
        fraudBtnIcon.textContent = "🛡️";
        fraudBtnText.textContent = "Erneut prüfen";
        fraudBtn.classList.remove("checking");
        fraudBtn.disabled = false;
      }
    }

    // ── Copy helper ──
    let toastTimer;
    function copy(text, label) {
      if (!text) return;
      navigator.clipboard.writeText(text.toString()).catch(console.error);
      clearTimeout(toastTimer);
      toast.textContent = `${label} kopiert!`;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function flashCopied(btn) {
      btn.classList.add("copied");
      btn.textContent = "✓";
      setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "Kopieren"; }, 1500);
    }

    // ── Events ──
    fraudBtn.addEventListener("click", checkFraud);

    copyLatBtn.addEventListener("click", () => {
      copy(copyLatValue, "Latitude");
      flashCopied(copyLatBtn);
    });
    copyLongBtn.addEventListener("click", () => {
      copy(copyLonValue, "Longitude");
      flashCopied(copyLongBtn);
    });

    let isRefreshing = false;
    refreshBtn.addEventListener("click", () => {
      if (isRefreshing) return;
      isRefreshing = true;
      document.getElementById("refreshIcon").textContent = "↺";
      refreshBtn.style.opacity = "0.4";
      loadData().finally(() => {
        isRefreshing = false;
        refreshBtn.style.opacity = "";
      });
    });

    // ── Init ──
    loadData();
  </script>
</body>
</html>
